<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能问答 · AI 智能文档问答系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body class="chat-body">
    <!-- 顶部导航 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <button class="btn btn-outline-light btn-sm me-2 d-md-none" id="sidebarToggle"><i class="bi bi-list"></i></button>
            <a class="navbar-brand fw-bold" href="/"><i class="bi bi-robot me-2"></i>DocQA</a>
            <div class="d-flex align-items-center">
                <span class="text-light small me-3" id="navUser"></span>
                <a href="/documents.html" class="btn btn-outline-light btn-sm me-2"><i class="bi bi-folder me-1"></i>文档管理</a>
                <a href="/chat.html" class="btn btn-outline-light btn-sm me-2 active"><i class="bi bi-chat-dots me-1"></i>问答</a>
                <button class="btn btn-outline-light btn-sm" id="logoutBtn"><i class="bi bi-box-arrow-right"></i> 退出</button>
            </div>
        </div>
    </nav>

    <div class="chat-container">
        <!-- 左侧：会话列表侧边栏 -->
        <aside class="chat-sidebar" id="chatSidebar">
            <div class="sidebar-header">
                <span class="fw-semibold"><i class="bi bi-chat-square-text me-1"></i>会话</span>
                <button class="btn btn-sm btn-outline-primary" id="newConvBtn" title="新建对话">
                    <i class="bi bi-plus-lg"></i> 新建
                </button>
            </div>
            <div class="conv-list" id="convList">
                <div class="text-center text-muted small py-4 conv-loading">加载中...</div>
            </div>
        </aside>

        <!-- 右侧：对话主区 -->
        <div class="chat-main">
            <!-- 消息区 -->
            <div id="chatBox" class="chat-box">
                <div class="text-center text-muted py-5">
                    <i class="bi bi-robot fs-1 d-block mb-3"></i>
                    <h5 class="fw-normal">基于你的文档进行问答</h5>
                    <p class="small">在左侧选择或新建会话，然后输入问题</p>
                </div>
            </div>

            <!-- 输入区 -->
            <div class="chat-input-area">
                <div class="container">
                    <div class="d-flex align-items-center justify-content-between mb-2">
                        <div class="form-check form-switch thinking-switch mb-0">
                            <input class="form-check-input" type="checkbox" id="thinkingToggle">
                            <label class="form-check-label small" for="thinkingToggle" title="开启后模型会先进行推理再回答（更慢但更深入）">
                                <i class="bi bi-lightbulb"></i> 深度思考
                            </label>
                        </div>
                        <span class="text-muted small" id="statusHint">就绪</span>
                    </div>
                    <form id="askForm" class="d-flex gap-2 align-items-end">
                        <div class="flex-grow-1">
                            <textarea id="questionInput" class="form-control" rows="1"
                                placeholder="输入你的问题... (Enter 发送, Shift+Enter 换行)" maxlength="2000" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary px-4" id="sendBtn">
                            <i class="bi bi-send"></i> 发送
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="toast" class="toast align-items-center border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body" id="toastBody"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/chat.js"></script>
</body>
</html>
