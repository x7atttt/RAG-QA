<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能问答 · AI 智能文档问答系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body class="chat-body">
    <!-- 顶部导航 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/"><i class="bi bi-robot me-2"></i>DocQA</a>
            <div class="d-flex align-items-center">
                <span class="text-light small me-3" id="navUser"></span>
                <a href="/documents.html" class="btn btn-outline-light btn-sm me-2"><i class="bi bi-folder me-1"></i>文档管理</a>
                <a href="/chat.html" class="btn btn-outline-light btn-sm me-2 active"><i class="bi bi-chat-dots me-1"></i>问答</a>
                <button class="btn btn-outline-light btn-sm" id="logoutBtn"><i class="bi bi-box-arrow-right"></i> 退出</button>
            </div>
        </div>
    </nav>

    <div class="chat-container">
        <!-- 消息区 -->
        <div id="chatBox" class="chat-box">
            <div class="text-center text-muted py-5">
                <i class="bi bi-robot fs-1 d-block mb-3"></i>
                <h5 class="fw-normal">基于你的文档进行问答</h5>
                <p class="small">在下方输入问题，例如：<a href="#" class="example-q">总结这份文档的核心内容</a></p>
            </div>
        </div>

        <!-- 来源引用区（动态插入到当前消息下方）-->

        <!-- 输入区 -->
        <div class="chat-input-area">
            <div class="container">
                <form id="askForm" class="d-flex gap-2 align-items-end">
                    <div class="flex-grow-1">
                        <textarea id="questionInput" class="form-control" rows="1"
                            placeholder="输入你的问题... (Enter 发送, Shift+Enter 换行)" maxlength="2000" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary px-4" id="sendBtn">
                        <i class="bi bi-send"></i> 发送
                    </button>
                </form>
                <div class="text-center text-muted small mt-1">
                    <span id="statusHint">就绪</span>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/chat.js"></script>
</body>
</html>
