<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文档管理 · AI 智能文档问答系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
    <!-- 顶部导航 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/"><i class="bi bi-robot me-2"></i>DocQA</a>
            <div class="d-flex align-items-center">
                <span class="text-light small me-3" id="navUser"></span>
                <a href="documents.html" class="btn btn-outline-light btn-sm me-2 active">文档管理</a>
                <a href="chat.html" class="btn btn-outline-light btn-sm me-2">智能问答</a>
                <button class="btn btn-outline-light btn-sm" id="logoutBtn"><i class="bi bi-box-arrow-right"></i> 退出</button>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold mb-0"><i class="bi bi-folder me-2"></i>文档管理</h3>
            <a href="chat.html" class="btn btn-primary btn-sm"><i class="bi bi-chat-dots me-1"></i>去问答</a>
        </div>

        <!-- 上传区 -->
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body">
                <div id="dropZone" class="drop-zone text-center py-4">
                    <i class="bi bi-cloud-arrow-up fs-1 text-muted"></i>
                    <p class="mb-1 mt-2">拖拽文件到这里，或 <span class="text-primary fw-semibold">点击选择</span></p>
                    <p class="text-muted small mb-0">支持 PDF / DOCX / MD，单个文件 ≤ 20MB</p>
                    <input type="file" id="fileInput" class="d-none" accept=".pdf,.docx,.md">
                </div>
                <div id="uploadProgress" class="mt-3 d-none">
                    <div class="d-flex justify-content-between small mb-1">
                        <span id="uploadFileName"></span>
                        <span id="uploadStatus" class="text-muted">上传中...</span>
                    </div>
                    <div class="progress" style="height: 6px;">
                        <div class="progress-bar progress-bar-striped progress-bar-animated" style="width: 100%"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 文档列表 -->
        <div class="card border-0 shadow-sm">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="mb-0">文档列表</h5>
                    <span class="text-muted small" id="listMeta"></span>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>文件名</th>
                                <th>类型</th>
                                <th class="text-end">分块数</th>
                                <th class="text-end">大小</th>
                                <th>上传时间</th>
                                <th class="text-end">操作</th>
                            </tr>
                        </thead>
                        <tbody id="docTbody">
                            <tr><td colspan="6" class="text-center text-muted py-4">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
                <div class="text-center mt-3">
                    <button id="loadMoreBtn" class="btn btn-outline-primary btn-sm d-none"><i class="bi bi-arrow-down-circle me-1"></i>加载更多</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="toast" class="toast align-items-center border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body" id="toastBody"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/documents.js"></script>
</body>
</html>
