<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 · AI 智能文档问答系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body class="auth-body">
    <div class="auth-wrapper">
        <div class="card auth-card shadow-sm">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <h3 class="fw-bold mb-1">AI 文档问答系统</h3>
                    <div class="text-muted small">登录或注册以开始使用</div>
                </div>

                <!-- 切换标签 -->
                <ul class="nav nav-pills nav-justified mb-4" id="authTab" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="login-tab" data-bs-toggle="pill" data-bs-target="#login-pane" type="button" role="tab">登录</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="register-tab" data-bs-toggle="pill" data-bs-target="#register-pane" type="button" role="tab">注册</button>
                    </li>
                </ul>

                <div class="tab-content">
                    <!-- 登录表单 -->
                    <div class="tab-pane fade show active" id="login-pane" role="tabpanel">
                        <form id="loginForm" novalidate>
                            <div class="mb-3">
                                <label class="form-label">用户名</label>
                                <input type="text" class="form-control" name="username" autocomplete="username" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">密码</label>
                                <input type="password" class="form-control" name="password" autocomplete="current-password" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2" id="loginBtn">登录</button>
                        </form>
                    </div>

                    <!-- 注册表单 -->
                    <div class="tab-pane fade" id="register-pane" role="tabpanel">
                        <form id="registerForm" novalidate>
                            <div class="mb-3">
                                <label class="form-label">用户名</label>
                                <input type="text" class="form-control" name="username" autocomplete="username" required minlength="3" maxlength="50">
                                <div class="form-text">3-50 个字符</div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">密码</label>
                                <input type="password" class="form-control" name="password" autocomplete="new-password" required minlength="6" maxlength="128">
                                <div class="form-text">至少 6 位</div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">确认密码</label>
                                <input type="password" class="form-control" name="password2" autocomplete="new-password" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2" id="registerBtn">注册</button>
                        </form>
                    </div>
                </div>

                <!-- 提示信息 -->
                <div id="authAlert" class="alert mt-3 mb-0 d-none" role="alert"></div>

                <div class="text-center mt-3">
                    <a href="index.html" class="text-decoration-none small">← 返回首页</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/auth.js"></script>
</body>
</html>
